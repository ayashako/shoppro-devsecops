name: ShopPro DevSecOps CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-scan:
    name: Test and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # -------------------------
      # Application tests
      # -------------------------

      - name: Test frontend
        working-directory: frontend
        run: |
          npm install
          npm test

      - name: Test product service
        working-directory: services/product-service
        run: |
          npm install
          npm test

      - name: Test order service
        working-directory: services/order-service
        run: |
          npm install
          npm test

      # -------------------------
      # SAST scan
      # -------------------------

      - name: Install Semgrep
        run: python3 -m pip install semgrep

      - name: Run Semgrep SAST scan
        run: semgrep scan --config auto .
        continue-on-error: true
        

      # -------------------------
      # Trivy repository scan
      # -------------------------

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      # -------------------------
      # Build container images
      # -------------------------

      - name: Build frontend image
        run: |
          docker build \
            -t shoppro-frontend:${{ github.sha }} \
            ./frontend

      - name: Build product-service image
        run: |
          docker build \
            -t shoppro-product-service:${{ github.sha }} \
            ./services/product-service

      - name: Build order-service image
        run: |
          docker build \
            -t shoppro-order-service:${{ github.sha }} \
            ./services/order-service

      # -------------------------
      # Trivy image scans
      # -------------------------

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: shoppro-frontend:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Scan product-service image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: shoppro-product-service:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Scan order-service image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: shoppro-order-service:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
