services:
  frontend:
    build:
      context: ./frontend
    container_name: shoppro-frontend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: "3001"
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT: "3002"
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - shoppro-network
    restart: unless-stopped

  product-service:
    build:
      context: ./services/product-service
    container_name: shoppro-product-service
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
    networks:
      - shoppro-network
    restart: unless-stopped

  order-service:
    build:
      context: ./services/order-service
    container_name: shoppro-order-service
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      NODE_ENV: production
      AWS_REGION: us-east-1
    networks:
      - shoppro-network
    restart: unless-stopped

networks:
  shoppro-network:
    driver: bridge
